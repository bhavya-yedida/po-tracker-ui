name: Deploy React App to Azure Storage Static Website

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build React app
      - name: Build React app
        run: npm run build

      # 5. Upload to Azure Storage ($web)
      - name: Upload to Azure Storage Static Website
        uses: azure/CLI@v1
        env:
          AZURE_STORAGE_ACCOUNT: mystorage
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name $AZURE_STORAGE_ACCOUNT \
              --auth-mode key \
              --destination '$web' \
              --source build \
              --overwrite